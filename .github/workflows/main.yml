name: Deploy via FTP Site Lakota

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 144.217.170.238
          username: 323_323_lakota
          password: ${{ secrets.FTP_PWS }}
          server-dir: /323_323_lakota/wwwroot/
          exclude: |
            **/.git*
            **/.github*
            **/node_modules/**