<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ficha de Anamnese</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../Css/anamnese.css">
</head>

<body>

<div class="container">

<form method="POST" action="enviar-anamnese.asp">

<!-- IDENTIFICAÇÃO -->
<div class="section-title">IDENTIFICAÇÃO</div>

<div class="card">

<label>E-mail</label>
<input type="email" name="email" required>

<label>Nome</label>
<input type="text" name="nome" required>

<label>Gênero</label>
<select name="genero" required>
    <option value="" disabled selected>Selecione</option>
    <option value="M">Masculino</option>
    <option value="F">Feminino</option>
</select>

<label for="nascimento">Nascimento</label>
<input 
    type="date" 
    id="nascimento"
    name="nascimento" 
    required
    max="2026-12-31">

</div>

<!-- ANAMNESE -->
<div class="section-title">ANAMNESE</div>

<div class="card">

<!-- EXPANDER -->
<div class="expander-header" onclick="toggleExpander()">
Usou ou usa drogas?
</div>

<div id="expander" class="expander-content">

<label>Já utilizou substâncias ilegais?</label>
<select id="selectDroga" onchange="toggleDrogas()">
<option>Selecione</option>
<option>Não</option>
<option>Sim</option>
</select>

<div id="areaDrogas" class="hidden">

<!-- CANNABIS -->
<div class="row">
<input type="checkbox" onchange="toggleCampo(this,'cannabis')">
<label>Cannabis</label>
</div>
<input id="cannabis_desde" class="hidden" placeholder="Desde quando?">
<input id="cannabis_ultima" class="hidden" placeholder="Última vez?">

<!-- COCAÍNA -->
<div class="row">
<input type="checkbox" onchange="toggleCampo(this,'cocaina')">
<label>Cocaína</label>
</div>
<input id="cocaina_desde" class="hidden" placeholder="Desde quando?">
<input id="cocaina_ultima" class="hidden" placeholder="Última vez?">

<!-- CRACK -->
<div class="row">
<input type="checkbox" onchange="toggleCampo(this,'crack')">
<label>Crack</label>
</div>
<input id="crack_desde" class="hidden" placeholder="Desde quando?">
<input id="crack_ultima" class="hidden" placeholder="Última vez?">

<!-- ECSTASY -->
<div class="row">
<input type="checkbox" onchange="toggleCampo(this,'ecstasy')">
<label>Ecstasy / Bala</label>
</div>
<input id="ecstasy_desde" class="hidden" placeholder="Desde quando?">
<input id="ecstasy_ultima" class="hidden" placeholder="Última vez?">

<!-- OUTROS -->
<div class="row">
<input type="checkbox" onchange="toggleCampo(this,'outros')">
<label>Outros</label>
</div>
<input id="outros_nome" class="hidden" placeholder="Qual?">
<input id="outros_desde" class="hidden" placeholder="Desde quando?">
<input id="outros_ultima" class="hidden" placeholder="Última vez?">

</div>

</div>




</div>

<!-- PSIQUIATRIA -->
<div class="card">

    <!-- HEADER -->
    <div class="expander-header" onclick="togglePsiquiatria()">
        Situações Psiquiátricas
    </div>

    <!-- CONTEÚDO -->
   <div id="expanderPsiquiatria" class="expander-content">

        <label>Apresenta ou teve situações psiquiátricas?</label>
        <select id="PsiquiatraPicker" onchange="togglePsiquiatriaDetalhes()">
            <option value="" selected disabled>Selecione</option>
            <option value="nao">Não</option>
            <option value="sim">Sim</option>
        </select>

        <!-- CAMPOS QUANDO "SIM" -->
        <div id="TratamentoStack" style="display: none;">

            <label>Faz ou fez tratamento psiquiátrico adequado?</label>
            <select id="TratamentoPicker" onchange="toggleTipoTratamento()">
                <option value="" selected disabled>Selecione</option>
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <input type="text" id="TipoTratamentoEntry" style="display: none;" placeholder="Qual tipo de tratamento?">
            
        </div>

    </div>

</div>

<button type="submit">Enviar</button>

</form>

</div>

<script src="../js/anamnese.js"></script>

</body>
</html>
