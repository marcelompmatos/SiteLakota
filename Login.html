<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Painel ADM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/adm.css">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <img src="images/xamanismo_logo.png" class="login-logo" alt="Logo">
        <h2>Área Administrativa</h2>
        <p>Faça login para continuar</p>

        <input type="email" id="email" class="form-control" placeholder="Email">
        <input type="password" id="senha" class="form-control" placeholder="Senha">
        <button class="btn-add" onclick="login()">Entrar</button>

        <div class="login-error" id="loginError"></div>
    </div>
</div>

<script src="Js/auth.js"></script>
</body>
</html>
